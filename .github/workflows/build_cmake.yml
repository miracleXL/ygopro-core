name: Automated Test Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # push:
  #   branches: [ "master" ]
  # pull_request:
  #   branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download lua
      id: lua
      uses: mercury233/action-cache-download-file@0e2b8bab566270adae95bd3cd298744402b667eb # v1.1.0
      with:
        url: https://www.lua.org/ftp/lua-5.4.8.tar.gz

    - name: Lua
      run: |
        tar -xzf ${{ steps.lua.outputs.filepath }}
        move lua-5.4.8 lua

    - name: Download premake
      id: premake
      uses: mercury233/action-cache-download-file@0e2b8bab566270adae95bd3cd298744402b667eb
      with:
        url: https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip

    - name: Premake
      run: |
        mkdir premake-5
        tar -C premake-5 -xzf ${{ steps.premake.outputs.filepath }}
        copy premake\lua.lua lua\premake5.lua
        copy premake\dll.lua dll.lua
        .\premake-5\premake5.exe vs2022 --file=dll.lua

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build x32
      run: |
        msbuild build\ocgcoredll.sln /m /t:Build /p:"Configuration=Release;Platform=Win32"

    - name: Build x64
      run: |
        msbuild build\ocgcoredll.sln /m /t:Build /p:"Configuration=Release;Platform=x64"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ocgcore-windows
        path: |
          build/bin/x32/Release/ocgcore.dll
          build/bin/x64/Release/ocgcore.dll

    - name: GitHub Release
      if: github.event_name == 'push'
      uses: salix5/action-automatic-releases@e0545bc14e9677f38aa573f1a52563022f987356 # node24
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: true
        title: "Development Build"
        files: |
          build/bin/x64/Release/ocgcore.dll

  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-multilib g++-multilib

    - name: Download lua
      id: lua
      uses: mercury233/action-cache-download-file@0e2b8bab566270adae95bd3cd298744402b667eb
      with:
        url: https://www.lua.org/ftp/lua-5.4.8.tar.gz

    - name: Lua
      run: |
        tar -xzf ${{ steps.lua.outputs.filepath }}
        mv lua-5.4.8 lua

    - name: Build x64
      run: |
        mkdir -p build-x64
        cd build-x64
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON ..
        make -j 4

    - name: Build x32
      run: |
        mkdir -p build-x32
        cd build-x32
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32" ..
        make -j 4

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ocgcore-linux
        path: |
          build-x64/libocgcore.so
          build-x32/libocgcore.so
